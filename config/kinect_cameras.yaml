    frame: kinect2_3_link
    position:
      x: 1.7250229003607818
      y: 0.38321394828841027
      z: 0.9689872099394938
    orientation:
      roll: 0.01363704819092533
      pitch: -0.09112338017412161
      yaw: -1.9911738653058177
    calibration:
      vicon_object: KinectV2_3
      marker_to_link_offset:
        x: 0.0
