# Unified multi-camera configuration for multi_kinect_simple.launch.py
#
# One camera entry = one Kinect pipeline (bridge + point cloud + optional TF).
# Add/remove camera blocks under `cameras:` to scale sensor count.
#
# Optional per-camera point cloud distance filter (Z-axis):
#   point_cloud_filter:
#     min_distance: 0.0    # metres, filters closer than this (0.0 = no near-clipping)
#     max_distance: 5.0    # metres, filters farther than this (large value = no far-clipping)
#
# Recording launchers use `record: true/false` to decide which cameras to save.
#
# Launch parameters can override these defaults:
#   ros2 launch ... point_cloud_filter_min_distance:=0.5 point_cloud_filter_max_distance:=3.0
#
# Per-camera settings override launch parameters if present.
#
# To detect the camera's serial number, re-detect serials with:
#   lsusb -v -d 045e:02c4 2>/dev/null | grep iSerial
#
# Axis conventions used by vicon_marker_calibration_tf.py:
#   forward = Top1 -> Top2
#   camera-left = Top4 -> Top3
#   up = forward x camera-left

world_frame: map

cameras:
  kinect2_1:
    serial: "001934470647"
    enabled: true
    record: true
    frame: kinect2_1_link
    position:
      x: 2.180622097845552
      y: 0.5244930179473146
      z: 0.9542954810090617
    orientation:
      roll: -0.028268183752626894
      pitch: -0.10526059889219368
      yaw: -0.17619952136934408
    calibration:
      vicon_object: KinectV2_1
      marker_to_link_offset:
        x: 0.0
        y: 0.0
        z: -0.03925
    # point_cloud_filter:
