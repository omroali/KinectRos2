# Each unit MUST have a unique `port` (set in the sensor's web interface).
# Topics are namespaced by entry name: /velodyne_1/velodyne_points, ...
# Pose edits are live: static_tf_from_yaml.py watches this file.

world_frame: map

cameras:
  velodyne_1:
    enabled: true
    record: true
    frame: velodyne_1
    # TEMP: sensor is currently at factory default IP, broadcasting to :2368.
    # Proper fix: set the sensor to 10.68.0.55 via its web UI (see README),
    # then restore device_ip: "10.68.0.55".
    device_ip: "192.168.1.201"
    port: 2368
    model: VLP16
    position: {x: 0.0, y: 0.0, z: 1.0}
    orientation: {roll: 0.0, pitch: 0.0, yaw: 0.0}

