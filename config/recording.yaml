# Unified recording settings — read by BOTH the Kinect and RealSense
# recording managers. Each manager only uses the keys relevant to it.
#
# This file lives in the repo-level config/ directory, mounted into the
# container at $SENSOR_CONFIG_DIR (/home/ubuntu/config). Edit here; no
# rebuild needed, just restart the recording service.

recording_settings:
  output_root: "/home/ubuntu/data"
  uuid: "0000"

  # ───────────────────────── Video (colour/IR streams) ─────────────────────
  # Encoder: libx265 (CPU), hevc_nvenc (Nvidia GPU), hevc_qsv (Intel),
  # hevc_amf (AMD).
  video_encoder: "hevc_nvenc"

  # H.265 CRF, 0-51. Lower = better quality / larger files.
  #   18 visually lossless · 22 high · 28 good · 35 low
  video_crf: 18

  # Frame rate written to the .mp4 container; match the sensor rate.
  video_fps: 30.0

  # ───────────────────────── Rosbag (depth/metadata) ───────────────────────
  # Storage format: mcap (recommended) or sqlite3.
  bag_storage: "mcap"

  # Bag compression. Options:
  #   none    - off
  #   storage - mcap chunk-level zstd via --storage-preset-profile (RECOMMENDED
  #             for mcap: better ratio than message mode, index stays usable)
  #   message - rosbag2 per-message zstd (legacy; works with any storage)
  #   file    - outer zstd wrapper; whole file must be decompressed to read
  bag_compression: "storage"

  # Only used when bag_compression is "storage".
  #   zstd_fast  - fast zstd, moderate ratio (safe default)
  #   zstd_small - 4MB chunks + slowest zstd, best ratio, highest CPU.
  #                Try this if disk throughput/size is the bottleneck; watch
  #                the recorder for dropped messages.
  mcap_preset: "zstd_fast"

  # In-memory cache per bag recorder (MB). Buffers against disk latency
  # spikes; raise for slow drives, lower if RAM is tight. (Kinect manager)
  bag_cache_size_mb: 128

  # ───────────────────────── RealSense per-stream settings ─────────────────
  # Applied to every RealSense camera with record: true.
  #   enabled : record this stream
  #   mode    : "compressed" subscribes to the camera's JPEG topic (low
  #             bandwidth, lossy on top of camera compression); "raw"
  #             subscribes to the uncompressed topic and re-encodes locally.
  #             Only "color" supports compressed mode.
  #   fps     : target recording rate; recorder subsamples on ROS timestamps.
  streams:
    color:
      enabled: true
      # raw ~46 MB/s vs compressed ~5 MB/s per camera over the network
      mode: "compressed"
      fps: 30
    infrared_1:
      enabled: true
      mode: "raw"
      fps: 15
    infrared_2:
      enabled: true
      mode: "raw"
      fps: 15
    depth:
      enabled: true

  # ───────────────────────── Vicon ────────────────────────────────────────
  vicon:
    # Whether to record Vicon topics (segments, labeled markers, unlabeled
    # markers). All topics matching topic_regex are added to the bag.
    enabled: true
    topic_regex: "/vicon/.*"

  # ───────────────────────── Velodyne ─────────────────────────────────────
  velodyne:
    # Recorded for every unit in velodyne.yaml with record: true.
    # Names are relative to each unit's namespace (/<unit>/<topic>).
    topics:
      - "velodyne_points"     # decoded PointCloud2 — ready to use, large
      # - "velodyne_packets"  # raw UDP packets — ~4x smaller, lossless, but
      #                       # needs replay through velodyne_pointcloud to
      #                       # reconstruct clouds. Enable to save disk;
      #                       # you may then disable velodyne_points.
