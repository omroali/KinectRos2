services:
  ros2_humble:
    build:
      context: .
      dockerfile: Dockerfile
    image: ros2-humble # resulting image name

    stdin_open: true
    tty: true
    command: /bin/bash # default shell when you attach
    network_mode: host # helps ROS 2 discovery

    # Use privileged for full USB access (required for Kinect v2)
    privileged: true

    # Dynamic USB access via volume mounts (instead of static devices)
    # This allows the container to see device changes without restart
    volumes:
      # USB devices - dynamic view
      - /dev/bus/usb:/dev/bus/usb:rw
      # udev for device hotplug detection
      - /run/udev:/run/udev:ro
      # udev rules (so container knows about permissions)
      - /etc/udev/rules.d:/etc/udev/rules.d:ro

      # Project source code
      - ../kinect2_ros2:/home/ros/base_ws/src/kinect2_ros2:rw
      - ../bash_scripts/container:/home/ros/bash_scripts:rw
      - ../config:/home/ros/config:rw

      # X11 for GUI applications (rviz, etc.)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    environment:
      - BASE_WS=/home/ros/base_ws
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      # Suppress some Qt/GTK warnings
      - QT_LOGGING_RULES="*.debug=false"

    # Add user to plugdev group for USB device access
    group_add:
      - plugdev
      - video