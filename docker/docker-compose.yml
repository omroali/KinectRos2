services:
  ros2_humble:
    build:
      context: .
      dockerfile: Dockerfile
    image: ros2-humble # resulting image name

    stdin_open: true
    tty: true
    command: /bin/bash # default shell when you attach
    network_mode: host # helps ROS 2 discovery (optional)

    privileged: true
    devices:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb

    volumes:
      - ../ros2_ws:/home/ros/base_ws/src/ros2_ws:rw
      - ../kinect2_ros2:/home/ros/base_ws/src/kinect2_ros2:rw
      - ../openni2_camera:/home/ros/base_ws/src/openni2_camera:rw
      - ../bash_scripts/container:/home/ros/bash_scripts:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    environment:
      - BASE_WS=/home/ros/base_ws
      - DISPLAY=:0
      - QT_X11_NO_MITSHM=1
